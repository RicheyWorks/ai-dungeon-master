# ─── Server ───────────────────────────────────────────────────────────────────
server.port=8080

# ─── Game Configuration ───────────────────────────────────────────────────────
game.difficulty=4
game.chaos=4

# Comma-separated; index-matched to game.party.roles
game.party.names=Kael,Lira
game.party.roles=Warrior,Mage

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.xai.dungeonmaster=DEBUG

# ─── GUI ──────────────────────────────────────────────────────────────────────
# Set to false to run headless (web/REST/WebSocket only, no Swing window)
game.gui.enabled=true

# --- Narration (LLM provider) ---
# Active provider id; "local-stub" is the offline, no-key default narrator.
game.narration.provider=local-stub
# Per-session token ceiling for the cost guardrail.
game.narration.token.ceiling=4000

# ─── Auth (session identity + JWT) ────────────────────────────────────────────
# Enforcement is opt-in. When false, /v2 endpoints stay open and identity is
# best-effort (a valid token is still resolved and attached when present).
game.auth.enabled=false
# HMAC-SHA256 secret for signing session tokens. Leave blank for an insecure
# dev secret (a warning is logged); set a strong value before enabling auth.
game.auth.jwt.secret=
# Token lifetime in seconds (default 24h).
game.auth.jwt.ttl-seconds=86400
# ─── Plugins ──────────────────────────────────────────────────────────────────
# Signature policy for code-bearing plugin JARs: LENIENT, REQUIRED, or DISABLED.
game.plugins.signature.policy=LENIENT
# Sandbox plugin bytecode: reject JARs referencing blocked APIs (process exec,
# reflection, raw net/fs, JDK internals) before loading. Set false to disable.
game.plugins.sandbox.enabled=true
# --- Narration providers (keyed) ---
# Select with game.narration.provider = openai | xai | anthropic | llama | local-stub.
# Keys/models come from env (or -D): e.g. OPENAI_API_KEY, OPENAI_MODEL, ANTHROPIC_API_KEY,
# XAI_API_KEY, LLAMA_BASE_URL. A provider with no key reports DOWN and the registry
# transparently falls back to the offline local-stub narrator.
# --- Content-pack upload (POST /v2/catalog/packs) ---
# Raw multipart limits; the service additionally caps uncompressed size at 20 MB.
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB
# Session store: "memory" (default; sessions lost on restart) or "file" (survive restart).
game.auth.session.store=memory
# When store=file, the JSON file sessions are persisted to (relative to the working dir).
game.auth.session.file=sessions.json
